<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Maddux Gremaux</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #fff;
      color: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav .logo {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
    }

    nav ul a {
      color: #111;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    nav ul a:hover { opacity: 0.5; }

    .contact-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 40px 80px;
      max-width: 560px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 32px;
    }

    .contact-body p {
      font-size: 18px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 48px;
    }

    .email-link {
      font-size: clamp(24px, 4vw, 48px);
      font-weight: 400;
      color: #111;
      text-decoration: none;
      letter-spacing: -0.02em;
      border-bottom: 1px solid #111;
      padding-bottom: 4px;
      transition: opacity 0.2s;
    }

    .email-link:hover { opacity: 0.4; }

    .social-links {
      margin-top: 64px;
      display: flex;
      gap: 32px;
    }

    .social-links a {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      text-decoration: none;
    }

    .social-links a:hover { color: #111; }

    footer {
      padding: 24px 40px;
      font-size: 12px;
      color: #ccc;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">Maddux Gremaux</a>
    <ul>
      <li><a href="index.html#prints">Prints</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="contact-body">
    <p class="label">Contact</p>
    <p>For print inquiries, commissions, or press.</p>
    <a class="email-link" href="mailto:gremauxmaddux@gmail.com">gremauxmaddux@gmail.com</a>
    <div class="social-links">
      <a href="https://www.instagram.com/madduxgphotography/" target="_blank">Instagram</a>
      <a href="https://www.linkedin.com/in/madduxgremaux" target="_blank">LinkedIn</a>
    </div>
  </div>

  <footer>© 2026 Maddux Gremaux</footer>

</body>
</html>
